query ActiveCart {
  activeCart {
    id
    lastPurchasedAt
  }
}

query VendorCart($vendorId: ID) {
  vendorCart(vendorId: $vendorId) {
    id
    lastPurchasedAt
  }
}

query AllCarts {
  allCarts {
    id
    lastPurchasedAt
  }
}

query CartItems($cartId: ID!) {
  cartItems(cartId: $cartId) {
    id
    cartId
    itemId
    quantity
  }
}

query AllCartItems {
  allCartItems {
    id
    cartId
    itemId
    quantity
  }
}

query CartItemCountByItem($itemId: ID!) {
  cartItemCountByItem(itemId: $itemId)
}

mutation AddToCart($cartId: ID!, $itemId: ID!, $quantity: Int!) {
  addToCart(cartId: $cartId, itemId: $itemId, quantity: $quantity) {
    id
    cartId
    itemId
    quantity
  }
}

mutation UpdateCartItem($id: ID!, $quantity: Int!) {
  updateCartItem(id: $id, quantity: $quantity) {
    id
    cartId
    itemId
    quantity
  }
}

mutation RemoveFromCart($id: ID!) {
  removeFromCart(id: $id)
}

mutation Checkout($cartId: ID!, $note: String, $logKey: String, $logParams: JSON) {
  checkout(cartId: $cartId, note: $note, logKey: $logKey, logParams: $logParams) {
    id
    lastPurchasedAt
  }
}

mutation AbandonCart($cartId: ID!) {
  abandonCart(cartId: $cartId) {
    id
  }
}
