mutation BulkCreateItems($items: [ItemInput!]!) {
  bulkCreateItems(items: $items) {
    id
    name
    tagIds
    vendorIds
    packageUnit
    measurementUnit
    amountPerPackage
    targetUnit
    targetQuantity
    refillThreshold
    packedQuantity
    unpackedQuantity
    consumeAmount
    dueDate
    estimatedDueDays
    expirationThreshold
    userId
    createdAt
    updatedAt
  }
}

mutation BulkCreateTags($tags: [TagInput!]!) {
  bulkCreateTags(tags: $tags) {
    id
    name
    typeId
    userId
  }
}

mutation BulkCreateTagTypes($tagTypes: [TagTypeInput!]!) {
  bulkCreateTagTypes(tagTypes: $tagTypes) {
    id
    name
    color
    userId
  }
}

mutation BulkCreateVendors($vendors: [VendorInput!]!) {
  bulkCreateVendors(vendors: $vendors) {
    id
    name
    userId
  }
}

mutation BulkCreateRecipes($recipes: [RecipeInput!]!) {
  bulkCreateRecipes(recipes: $recipes) {
    id
    name
    items {
      itemId
      defaultAmount
    }
    lastCookedAt
    userId
  }
}

mutation BulkCreateInventoryLogs($logs: [InventoryLogInput!]!) {
  bulkCreateInventoryLogs(logs: $logs) {
    id
    itemId
    delta
    quantity
    occurredAt
    note
  }
}

mutation BulkCreateShoppingCarts($carts: [ShoppingCartInput!]!) {
  bulkCreateShoppingCarts(carts: $carts) {
    id
    lastPurchasedAt
  }
}

mutation BulkCreateCartItems($cartItems: [CartItemInput!]!) {
  bulkCreateCartItems(cartItems: $cartItems) {
    id
    cartId
    itemId
    quantity
  }
}

