mutation BulkCreateShelves($shelves: [ShelfInput!]!) {
  bulkCreateShelves(shelves: $shelves) {
    id
    name
    type
    order
    filterConfig {
      tagIds
      vendorIds
      recipeIds
    }
    itemIds
  }
}

mutation BulkUpsertShelves($shelves: [ShelfInput!]!) {
  bulkUpsertShelves(shelves: $shelves) {
    id
    name
    type
