query GetItem($id: ID!) {
  item(id: $id) {
    id
    name
    tagIds
    vendorIds
    packageUnit
    measurementUnit
    amountPerPackage
    targetUnit
    targetQuantity
    refillThreshold
    packedQuantity
    unpackedQuantity
    consumeAmount
    expirationMode
    dueDate
    estimatedDueDays
    expirationThreshold
    userId
    familyId
    createdAt
    updatedAt
  }
}

query GetItems {
  items {
    id
    name
    tagIds
    vendorIds
    packageUnit
    measurementUnit
    amountPerPackage
    targetUnit
    targetQuantity
    refillThreshold
    packedQuantity
    unpackedQuantity
    consumeAmount
    expirationMode
    dueDate
    estimatedDueDays
    expirationThreshold
    userId
    familyId
    createdAt
    updatedAt
  }
}

mutation CreateItem($input: CreateItemInput!) {
  createItem(input: $input) {
    id
    name
    tagIds
    targetUnit
    targetQuantity
    refillThreshold
    packedQuantity
    unpackedQuantity
    consumeAmount
    expirationMode
    dueDate
    estimatedDueDays
    expirationThreshold
    createdAt
    updatedAt
  }
}

mutation UpdateItem($id: ID!, $input: UpdateItemInput!) {
  updateItem(id: $id, input: $input) {
    id
    name
    tagIds
    vendorIds
    packageUnit
    measurementUnit
    amountPerPackage
    targetUnit
    targetQuantity
    refillThreshold
    packedQuantity
    unpackedQuantity
    consumeAmount
    expirationMode
    dueDate
    estimatedDueDays
    expirationThreshold
    updatedAt
  }
}

mutation DeleteItem($id: ID!) {
  deleteItem(id: $id)
}

query ItemCountByTag($tagId: String!) {
  itemCountByTag(tagId: $tagId)
}

query ItemCountByVendor($vendorId: String!) {
  itemCountByVendor(vendorId: $vendorId)
}

query ItemCountByRecipe($recipeId: String!) {
  itemCountByRecipe(recipeId: $recipeId)
}
