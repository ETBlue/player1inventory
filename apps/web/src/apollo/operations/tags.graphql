query GetTagTypes {
  tagTypes {
    id
    name
    color
    userId
    familyId
  }
}

query GetTags {
  tags {
    id
    name
    typeId
    userId
    familyId
    parentId
  }
}

query GetTagsByType($typeId: String!) {
  tagsByType(typeId: $typeId) {
    id
    name
    typeId
    userId
    familyId
    parentId
  }
}

mutation CreateTagType($name: String!, $color: String!) {
  createTagType(name: $name, color: $color) {
    id
    name
    color
    userId
  }
}

mutation UpdateTagType($id: ID!, $name: String, $color: String) {
  updateTagType(id: $id, name: $name, color: $color) {
    id
    name
    color
  }
}

mutation DeleteTagType($id: ID!) {
  deleteTagType(id: $id)
}

mutation CreateTag($name: String!, $typeId: String!, $parentId: String) {
  createTag(name: $name, typeId: $typeId, parentId: $parentId) {
    id
    name
    typeId
    userId
    parentId
  }
}

mutation UpdateTag($id: ID!, $name: String, $typeId: String, $parentId: String) {
  updateTag(id: $id, name: $name, typeId: $typeId, parentId: $parentId) {
    id
    name
    typeId
    parentId
  }
}

mutation DeleteTag($id: ID!, $deleteChildren: Boolean) {
  deleteTag(id: $id, deleteChildren: $deleteChildren)
}

query TagCountByType($typeId: String!) {
  tagCountByType(typeId: $typeId)
}
