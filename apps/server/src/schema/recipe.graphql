type RecipeItem {
  itemId: String!
  defaultAmount: Float!
}

input RecipeItemInput {
  itemId: String!
  defaultAmount: Float!
}

input ConsumeRecipesItemInput {
  itemId: ID!
  packedQuantity: Float!
  unpackedQuantity: Float!
  delta: Float!
  quantity: Float!
  note: String
  logKey: String
  logParams: JSON
}

input ConsumeRecipesInput {
  occurredAt: String!
  recipeIds: [ID!]!
  items: [ConsumeRecipesItemInput!]!
}

type ConsumeRecipesItemResult {
  itemId: ID!
  success: Boolean!
  error: String
}

type ConsumeRecipesResult {
  itemResults: [ConsumeRecipesItemResult!]!
  allSucceeded: Boolean!
}

type Recipe {
  id: ID!
  name: String!
  items: [RecipeItem!]!
  lastCookedAt: String
  userId: String!
  familyId: String
}

extend type Query {
  recipes: [Recipe!]!
  recipe(id: ID!): Recipe
}

extend type Mutation {
  createRecipe(name: String!, items: [RecipeItemInput!]): Recipe!
  updateRecipe(id: ID!, name: String, items: [RecipeItemInput!]): Recipe!
  updateRecipeLastCookedAt(id: ID!): Recipe!
  deleteRecipe(id: ID!): Boolean!
  consumeRecipes(input: ConsumeRecipesInput!): ConsumeRecipesResult!
}
